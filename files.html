<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Files - StudySphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">Study<span>Sphere</span></div>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="notes.html">Notes</a></li>
      <li><a href="files.html" class="active">Files</a></li>
      <li><a href="groups.html">Groups</a></li>
    </ul>
    <button class="btn-nav" onclick="window.location.href='notes.html'">Notes</button>
  </nav>

  <main class="page-wrapper feature-page">
    <section class="page-header">
      <p class="arcade-kicker">Files</p>
      <h1>Study materials</h1>
      <p class="page-sub">Attach PDFs, slides, briefs, and image references to your workspace.</p>
    </section>
    <section class="feature-grid two-col">
      <form class="feature-panel" id="file-form">
        <label>Title<input id="file-title" class="task-input" type="text" required></label>
        <label>Subject<input id="file-subject" class="task-input" type="text" required></label>
        <label>Choose file<input id="file-input" class="task-input" type="file" required></label>
        <button class="btn-primary" type="submit">Save File Reference</button>
        <p class="auth-note">This static version stores file details locally, not the full file in a server.</p>
      </form>
      <section class="feature-panel">
        <div class="feature-list" id="file-list"></div>
      </section>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/premium.js"></script>
  <script src="js/features.js"></script>
</body>
</html>
