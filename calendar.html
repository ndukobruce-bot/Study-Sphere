<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendar - StudySphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">Study<span>Sphere</span></div>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="planner.html">Planner</a></li>
      <li><a href="tasks.html">Tasks</a></li>
      <li><a href="calendar.html" class="active">Calendar</a></li>
      <li><a href="notes.html">Notes</a></li>
      <li><a href="flashcards.html">Flashcards</a></li>
    </ul>
    <button class="btn-nav" onclick="window.location.href='planner.html'">Plan</button>
  </nav>

  <main class="page-wrapper feature-page">
    <section class="page-header">
      <p class="arcade-kicker">Calendar</p>
      <h1>Your academic week</h1>
      <p class="page-sub">See tasks, exams, and saved plans in one timeline.</p>
    </section>
    <section class="feature-panel">
      <div class="calendar-toolbar">
        <button class="btn-outline-sm" id="calendar-prev" type="button">Previous</button>
        <h2 id="calendar-title"></h2>
        <button class="btn-outline-sm" id="calendar-next" type="button">Next</button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/features.js"></script>
</body>
</html>
