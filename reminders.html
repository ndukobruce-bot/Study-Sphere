<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reminders - StudySphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">Study<span>Sphere</span></div>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="autopilot.html">Autopilot</a></li>
      <li><a href="reminders.html" class="active">Reminders</a></li>
      <li><a href="tasks.html">Tasks</a></li>
      <li><a href="calendar.html">Calendar</a></li>
    </ul>
    <button class="btn-nav" id="enable-browser-reminders" type="button">Enable Alerts</button>
  </nav>

  <main class="page-wrapper feature-page">
    <section class="page-header smart-hero">
      <p class="arcade-kicker">Reminder System</p>
      <h1>Deadlines should find the student first.</h1>
      <p class="page-sub">StudySphere watches tasks, exams, plans, and custom reminders.</p>
    </section>

    <section class="feature-grid two-col">
      <form class="feature-panel smart-form" id="custom-reminder-form">
        <h2 class="section-title">Add Custom Reminder</h2>
        <label>Reminder title<input id="custom-reminder-title" class="task-input" type="text" required></label>
        <label>Date<input id="custom-reminder-date" class="task-input" type="date" required></label>
        <button class="btn-primary" type="submit">Add Reminder</button>
        <p class="form-status" id="reminder-status"></p>
      </form>

      <section class="feature-panel">
        <h2 class="section-title">Smart Reminder Feed</h2>
        <div class="feature-list" id="reminder-list"></div>
      </section>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/smart-tools.js"></script>
</body>
</html>
