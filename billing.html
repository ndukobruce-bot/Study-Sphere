<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Billing - StudySphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="auth-page billing-page">
    <section class="auth-brand">
      <div class="nav-logo">Study<span>Sphere</span></div>
      <h1>Upgrade to Premium.</h1>
      <p>Use Stripe Checkout for real payments. While keys are not configured, the demo unlock stays available for testing.</p>
      <div class="premium-price"><strong>$1.99</strong><span>/ month</span></div>
    </section>

    <section class="auth-card">
      <h2 class="section-title">Premium Checkout</h2>
      <div id="billing-status" class="billing-status"></div>
      <label class="consent-box">
        <input id="billing-consent" type="checkbox">
        <span>I understand Premium billing is handled by Stripe when backend keys are configured. The demo unlock is only for testing.</span>
      </label>
      <button class="btn-primary" id="stripe-checkout-btn" type="button">Pay $1.99 with Stripe</button>
      <button class="btn-outline" id="simulate-upgrade-btn" type="button">Demo Unlock</button>
      <button class="btn-outline" id="cancel-premium-btn" type="button">Cancel Premium</button>
      <a href="premium.html" class="auth-home-link">Back to Premium</a>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/premium.js"></script>
</body>
</html>
