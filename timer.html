<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timer – StudySphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">Study<span>Sphere</span></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="tasks.html">Tasks</a></li>
      <li><a href="timer.html" class="active">Timer</a></li>
      <li><a href="game.html">🎮 Game</a></li>
    </ul>
    <button class="btn-nav" onclick="window.location.href='dashboard.html'">Dashboard</button>
  </nav>

  <div class="page-wrapper timer-page">

    <div class="page-header">
      <h1>Pomodoro Timer</h1>
      <p class="page-sub">Focus. Rest. Repeat.</p>
    </div>

    <div class="timer-mode-tabs">
      <button class="mode-tab active" id="tab-study" onclick="switchMode('study')">Study (25 min)</button>
      <button class="mode-tab" id="tab-short" onclick="switchMode('short')">Short Break (5 min)</button>
      <button class="mode-tab" id="tab-long" onclick="switchMode('long')">Long Break (15 min)</button>
    </div>

    <div class="timer-ring-container">
      <svg class="timer-ring" viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="95"/>
        <circle class="ring-fill" id="ring-fill" cx="110" cy="110" r="95"
          stroke-dasharray="597"
          stroke-dashoffset="0"
        />
      </svg>
      <div class="timer-display">
        <div class="timer-mode-label" id="mode-label">Study Time</div>
        <div class="timer-time" id="timer-display">25:00</div>
        <div class="timer-session" id="session-label">Session 1</div>
      </div>
    </div>

    <div class="timer-controls">
      <button class="timer-btn-secondary" onclick="resetTimer()">↺ Reset</button>
      <button class="timer-btn-primary" id="start-btn" onclick="toggleTimer()">▶ Start</button>
      <button class="timer-btn-secondary" onclick="skipSession()">⟩⟩ Skip</button>
    </div>

    <div class="session-dots" id="session-dots"></div>

    <div class="timer-stats">
      <div class="t-stat">
        <div class="t-stat-val" id="ts-sessions">0</div>
        <div class="t-stat-label">Sessions Done</div>
      </div>
      <div class="t-stat">
        <div class="t-stat-val" id="ts-time">0 min</div>
        <div class="t-stat-label">Time Studied</div>
      </div>
      <div class="t-stat">
        <div class="t-stat-val" id="ts-breaks">0</div>
        <div class="t-stat-label">Breaks Taken</div>
      </div>
    </div>

    <div class="timer-tip" id="timer-tip">
      💡 Close distracting tabs and put your phone face down before starting.
    </div>

  </div>

  <script src="js/app.js"></script>
  <script src="js/timer.js"></script>
</body>
</html>
